<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#060d1f"/>
  <!-- Anchor shackle ring -->
  <circle cx="96" cy="38" r="14" fill="none" stroke="#f59e0b" stroke-width="8"/>
  <!-- Shank (vertical bar) -->
  <rect x="92" y="50" width="8" height="100" rx="4" fill="#f59e0b"/>
  <!-- Stock (horizontal crossbar) -->
  <rect x="52" y="76" width="88" height="8" rx="4" fill="#f59e0b"/>
  <!-- Left arm -->
  <path d="M92 148 C90 148 60 145 50 120" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M100 148 C102 148 132 145 142 120" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Left fluke tip -->
  <circle cx="50" cy="120" r="8" fill="#f59e0b"/>
  <!-- Right fluke tip -->
  <circle cx="142" cy="120" r="8" fill="#f59e0b"/>
</svg>
