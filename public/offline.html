<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline — LearnBulgEasy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: linear-gradient(to bottom, #060d1f, #0d1b3e, #0c2461);
      color: #bfdbfe;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fde68a;
      margin-bottom: 0.75rem;
      letter-spacing: 0.025em;
    }
    p {
      font-size: 0.95rem;
      color: #93c5fd;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 2rem;
    }
    button {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      width: 100%;
      max-width: 240px;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.8; transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">⚓</div>
  <h1>No Signal, Sailor</h1>
  <p>You've sailed beyond the reach of the internet. Reconnect to continue your voyage.</p>
  <button onclick="history.back()">← Go Back</button>
</body>
</html>
